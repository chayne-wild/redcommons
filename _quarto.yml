project:
  type: website
  output-dir: _site

website:
  title: "RedCommons: MECW"
  description: "Marx/Engels Collected Works"
  # Automatically generates a sidebar based on the directory structure
  sidebar:
    style: "docked"
    search: true
    contents: auto

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    # Forces all footnotes to render in the right margin
    reference-location: margin
    citation-location: margin
    # Applies the Lua filter to process page numbers before HTML generation
    filters:
      - page_numbers.lua
